# Statistic Channel Model Configuration
# Support both communication only mode and ISAC mode

# System Level Configuration
system_level:
  scenario: "UMa"  # Scenario type: UMa (Urban Macro), UMi (Urban Micro), RMa (Rural Macro)
  isd: 1732.0  # Inter-site distance in meters, only used for RMa scenario (1732 or 5000), ignored for UMa/UMi
  n_site: 1  # Number of sites in the simulation
  n_sector_per_site: 3  # Sectors per site: 1 (single-cell only) or 3 (hexagonal layout)
  n_ut: 20  # Total number of User Terminals (UTs) in the simulation
  ut_drop_cells: []  # Allowed cell IDs for UE dropping, e.g. [0, 4, 8]. Use [] (or omit this key) to allow all cells [0..n_site*n_sector_per_site-1].
  ut_drop_option: 0  # UT drop control: 0: randomly across whole region; 1: same number of UTs in each site; 2: same number of UTs in each sector. If nUt is not divisible by nSector/nSite, the remaining UTs will be assigned to the first nUt % (nSector/nSite) sectors/sites. E.g., nUt=20, nSector=3, sector 0 will have 7 UTs, sector 1 will have 7 UTs, sector 2 will have 6 UTs.
  ut_cell_2d_dist: [-1, -1]  # UT-to-serving-cell 2D distance range [min, max] in meters; [-1, -1] means default model behavior
  optional_pl_ind: 0  # Path loss model: 0=standard pathloss equation, 1=optional path loss equation
  o2i_building_penetr_loss_ind: 2  # Outdoor-to-Indoor building penetration loss: 0=none, 1=low-loss, 2=50% low-loss, 50% high-loss, 3=high-loss (for indoor UTs)
  o2i_car_penetr_loss_ind: 0  # Outdoor-to-Indoor car penetration loss: 0=none, 1=basic car, 2=50% basic, 50% metallized, 3=metallized (RMa only)
  enable_near_field_effect: 0  # Near field effect: 0=disable, 1=enable
  enable_non_stationarity: 0  # Non-stationarity effect: 0=disable, 1=enable
  force_indoor_ratio: -1  # Force indoor ratio for all links. -1 uses Table 7.4.1-1
  force_los_prob: [-1, -1]  # Force LOS probability for [indoor, outdoor] links. [-1,-1] uses Table 7.4.1-1
  force_ut_speed: [-1, -1]  # Force UT speed for [indoor, outdoor] links. [-1,-1] uses Table 7.4.1-1
  disable_pl_shadowing: 0  # Path loss and shadowing calculation: 0=calculate, 1=disable
  disable_small_scale_fading: 0  # Small scale fading: 0=calculate, 1=disable (fast fading = 1, only pathloss)
  enable_per_tti_lsp: 1  # LSP update per TTI: 0=disable, 1=update PL/O2I/shadowing only, 2=update everything
  enable_propagation_delay: 1  # Propagation delay in CIR: 0=disable, 1=enable (delay = cluster_delay + propagation_delay)
  
  # ISAC (Integrated Sensing and Communications) Configuration
  isac_type: 0  # ISAC type: 0=communication only (no sensing), 1=monostatic sensing (BS as TX/RX), 2=bistatic sensing (separate TX/RX)
  n_st: 0  # Number of sensing targets (STs) in the simulation (0 for communication-only mode)
  st_target_type: 0  # Sensing target type: 0=UAV, 1=AUTOMOTIVE, 2=HUMAN, 3=AGV, 4=HAZARD
  st_rcs_model: 1  # RCS model: 1=deterministic monostatic (n_spst=1), 2=angular dependent (n_spst varies by target type)
  st_vertical_velocity: 0.0  # Vertical velocity in m/s for sensing targets (used for Doppler calculation)
  st_horizontal_speed: [10.0, 10.0]  # Horizontal speed range [min,max] in m/s for sensing targets (direction is random)
  st_distribution_option: [0, 0]  # ST distribution per TR 38.901 Table 7.9.1-1: [horizontal, vertical]
                                  # horizontal: 0=Option A (uniform in cell, exclude min2D), 1=Option B (uniform, no exclusion), 2=Option C (reserved)
                                  # vertical: 0=Option A (uniform 1.5-300m), 1=Option B (height range from st_height)
  st_drop_radius: -1.0  # ST drop radius in meters: -1=use default cell radius (ISD/sqrt(3)~288m for ISD=500m), >0=override radius (e.g., 500.0 for Phase 1 calibration)
  st_override_k_db: .nan  # Override Ricean K for aerial targets (dB): .nan=LSP-generated K, any number=fixed K (Phase 2 UAV: 15.0 per TR 36.777 B.1.3)
  st_height: [25.0, 300.0]  # ST height range [min,max] in meters for vertical Option B
  st_minimum_distance: 0.0  # Minimum distance between STs in meters (0=auto based on physical size)
  st_min_dist_from_tx_rx: 25.0  # Minimum 2D distance from ST to any BS or UE in meters
  st_size_ind: 0  # ST size index per TR 38.901: UAV 0=large/1=small; AGV 0=small/1=large; HAZARD 0=child/1=adult/2=animal
  path_drop_threshold_db: 40.0  # Drop paths weaker than max-40 dB (ISAC)
  isac_disable_background: 0  # 0: combine target with background, 1: target CIR only (for calibration)
  isac_disable_target: 0      # 0: include target CIR, 1: background CIR only (for calibration)
  
  # Aerial UE Configuration (3GPP TR 36.777)
  aerial_ue_fast_fading_alt: 3  # Aerial UE fast fading: 1=B.1.1 (CDL-D), 2=B.1.2 (TDL-D), 3=B.1.3 (traditional with K=15dB) - only 3 supported
  aerial_ue_height_min: 1.5  # Minimum height for aerial UEs in meters (TR 36.777 calibration)
  aerial_ue_height_max: 300.0  # Maximum height for aerial UEs in meters (TR 36.777 calibration)

# Link Level Configuration
link_level:
  fast_fading_type: 0  # Fast fading model: 0=AWGN, 1=TDL (Tapped Delay Line), 2=CDL (Clustered Delay Line)
  delay_profile: "A"  # Delay profile type: 'A' to 'C' (TODO: support for 'D' and 'E')
  delay_spread: 30.0  # Delay spread in nanoseconds
  velocity: [0, 0, 0]  # Velocity vector (vx, vy, vz) in m/s, |velocity| = speed, vz = 0 per 3GPP spec
  num_ray: 0  # Number of rays per path (default: 48 for TDL, 20 for CDL)
  cfo_hz: 200.0  # Carrier frequency offset in Hz
  delay: 0.0  # Delay in seconds

# Simulation Configuration
simulation:
  link_sim_ind: 0  # Link simulation indicator
  center_freq_hz: 6e9  # Center frequency in Hz
  bandwidth_hz: 100e6  # Bandwidth in Hz
  sc_spacing_hz: 30000  # Subcarrier spacing in Hz (15e3 * 2)
  fft_size: 4096  # FFT size for OFDM processing
  n_prb: 273  # Number of Physical Resource Blocks (PRBs)
  n_prbg: 137  # Number of PRB Groups (PRBGs)
  n_snapshot_per_slot: 1  # Number of channel realizations per slot (1 or 14)
  run_mode: 0  # run mode, 0: CIR only, 1: CIR and CFR on PRBG, 2: CIR and CFR on Sc, 3: CIR and CFR on PRBG/Sc, 4: CIR and CFR on all N_FFT subcarriers, no PRBG
  internal_memory_mode: 1  # Memory management: 0=external memory for CIR/CFR (buffer allocated outside), 1=internal memory for CIR, external memory for CFR (use get*()), 2=internal memory for CIR/CFR (use get*())
  freq_convert_type: 1  # Frequency conversion: 0=first SC, 1=center SC, 2=last SC, 3=avg SC, 4=avg SC without ramping
  sc_sampling: 1  # Subcarrier sampling within PRBG (0:scSampling:N_sc_Prbg-1), only for freqConvertType=3/4
  proc_sig_freq: 0  # Signal processing frequency indicator (TODO: not used for now)
  optional_cfr_dim: 0  # Optional CFR dimension: 0: [nActiveUtForThisCell, n_snapshot_per_slot, nUtAnt, nBsAnt, nPrbg / nSc], 1: [nActiveUtForThisCell, n_snapshot_per_slot, nPrbg / nSc, nBsAnt, nUtAnt]
  cpu_only_mode: 0  # CPU only mode: 0=GPU mode, 1=CPU only mode
  h5_dump_level: 1  # 0=minimal dump, 1=full dump (default)

# Antenna Panel Configurations
antenna_panels:
  # BS antenna panel configuration (index 0)
  panel_0:
    n_ant: 4  # Total number of antennas (M_g * N_g * P * M * N)
    ant_size: [1, 1, 1, 2, 2]  # Array dimensions [M_g,N_g,M,N,P], M_g=N_g=1 for single panel
    ant_spacing: [2.5, 2.5, 0.5, 0.5]  # Spacing in wavelengths [d_g_h,d_g_v,d_h,d_v]
    ant_theta: []  # Antenna pattern A(theta, phi=0) in dB, 180 elements (required for ant_model=2)
    ant_phi: []  # Antenna pattern A(theta=90, phi) in dB, 360 elements (required for ant_model=2)
    ant_polar_angles: [45, -45]  # Polarization angles [roll_angle_first_polz, roll_angle_second_polz]
    ant_model: 1  # Antenna model: 0=isotropic, 1=directional (3GPP), 2=direct pattern

  # UE antenna panel configuration (index 1)
  panel_1:
    n_ant: 4  # Total number of antennas (M_g * N_g * P * M * N)
    ant_size: [1, 1, 2, 2, 1]  # Array dimensions [M_g,N_g,M,N,P], M_g=N_g=1 for single panel
    ant_spacing: [2.5, 2.5, 0.5, 0.5]  # Spacing in wavelengths [d_g_h,d_g_v,d_h,d_v]
    ant_theta: []  # Antenna pattern A(theta, phi=0) in dB, 180 elements (required for ant_model=2)
    ant_phi: []  # Antenna pattern A(theta=90, phi) in dB, 360 elements (required for ant_model=2)
    ant_polar_angles: [0, 90]  # Polarization angles [roll_angle_first_polz, roll_angle_second_polz]
    ant_model: 0  # Antenna model: 0=isotropic, 1=directional (3GPP), 2=direct pattern

# Test Bench Configuration (for C++ examples)
test_bench:
  n_tti: 10                     # Number of TTIs to simulate
  continuous_fading: 1          # Enable continuous fading between TTIs
  rand_seed: 0                  # Random seed for the simulation
  enable_half_precision: false  # Use single precision floating point
  enable_swap_tx_rx: false      # Normal DL mode (false), UL mode (true)

# External Configuration (Cells, UTs, Antenna Panels, Sensing Targets)
# Note: These are typically configured programmatically in C++/Python, not via YAML
# The examples below demonstrate the structure for reference

# Cell (Base Station) Configuration Examples
# cells:
#   cell_0:
#     cid: 0                                    # Global cell ID
#     site_id: 0                                # Site ID for LSP access
#     loc: [0, 0, 25]                           # Cell location [x, y, z] in meters (z=height)
#     ant_panel_idx: 0                          # Antenna panel configuration index (refers to antenna_panels section)
#     ant_panel_orientation: [0, 0, 0]          # Antenna orientation [theta, phi, slant_offset] in degrees
#     monostatic_ind: 0                         # ISAC monostatic sensing: 0=communication only, 1=BS acts as TX/RX for sensing
#     second_ant_panel_idx: 0           # Second antenna panel index for sensing RX (when monostatic_ind=1)
#     second_ant_panel_orientation: [0, 0, 0]  # Second antenna panel orientation for sensing RX

# User Terminal (UT) Configuration Examples
# uts:
#   ut_0:
#     uid: 0                                    # Global UE ID
#     loc: [100, 100, 1.5]                      # UE location [x, y, z] in meters (z=height)
#     outdoor_ind: 1                            # 0=indoor, 1=outdoor
#     ue_type: 0                                # UE type: 0=TERRESTRIAL, 1=VEHICLE, 2=AERIAL (uses 3GPP TR 36.777), 3=AGV, 4=RSU
#     ant_panel_idx: 1                          # Antenna panel configuration index (refers to antenna_panels section)
#     ant_panel_orientation: [0, 0, 0]          # Antenna orientation [theta, phi, slant_offset] in degrees
#     velocity: [0, 0, 0]                       # Velocity vector [vx, vy, vz] in m/s (vz=0 per 3GPP spec)
#     monostatic_ind: 0                         # ISAC monostatic sensing: 0=not a sensing receiver, 1=UE receives sensing reflections
#     same_antenna_panel_ind: 1                 # 0=use second antenna panel for sensing, 1=use same antenna panel for sensing
#     second_ant_panel_idx: 0           # Second antenna panel index for sensing RX (when monostatic_ind=1 and same_antenna_panel_ind=0)
#     second_ant_panel_orientation: [0, 0, 0]  # Second antenna panel orientation for sensing RX

# Sensing Target (ST) Configuration Examples (for ISAC simulations)
# Note: LOS/NLOS is determined per-link (STX-SPST and SPST-SRX), not per-ST
# sensing_targets:
#   st_0:
#     sid: 0                                    # Global sensing target ID
#     target_type: 0                            # Sensing target type: 0=UAV, 1=AUTOMOTIVE, 2=HUMAN, 3=AGV, 4=HAZARD
#     indoor_ind: 0                             # Indoor indicator: 0=outdoor, 1=indoor (ST-specific)
#     velocity: [0, 0, 0]                       # Velocity vector [vx, vy, vz] in m/s
#     loc: [200, 200, 50]                       # ST location [x, y, z] in meters (GCS)
#     orientation: [0, 0]                       # Target orientation [azimuth, elevation] in degrees
#     physical_size: [1.0, 1.0, 1.0]            # Physical dimensions [length, width, height] in meters
#     rcs_model: 1                              # RCS model: 1=deterministic (n_spst=1), 2=angular dependent (n_spst>=1)
#     n_spst: 1                                 # Number of scattering points (SPSTs): 1 for RCS Model 1, 1-5 for RCS Model 2
#     spst_configs:                             # SPST configuration for each scattering point
#       - spst_id: 0                            # SPST ID within ST (0-indexed)
#         loc_in_st_lcs: [0, 0, 0]              # Location in ST's local coordinate system [x, y, z] in meters
#         rcs_sigma_m_dbsm: -12.81              # Mean monostatic RCS sigma_M in dBsm (Table 7.9.2.1-1)
#         rcs_sigma_d_dbsm: 1.0                 # Mean RCS sigma_D in dBsm
#         rcs_sigma_s_db: 3.74                  # Standard deviation sigma_s in dB
#         rcs_incident_theta_i: 0.0             # Incident zenith angle in radians (for RCS Model 2)
#         rcs_incident_phi_i: 0.0               # Incident azimuth angle in radians (for RCS Model 2)
#         rcs_scattered_theta_s: 0.0            # Scattered zenith angle in radians (for RCS Model 2)
#         rcs_scattered_phi_s: 0.0              # Scattered azimuth angle in radians (for RCS Model 2)
#         rcs_k_sp: 0.0                         # XPR in dB (for RCS Model 2)
#         enable_forward_scattering: 1          # Forward scattering: 0=disable, 1=enable
