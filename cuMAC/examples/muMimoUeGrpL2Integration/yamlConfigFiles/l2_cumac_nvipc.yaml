---
# Transport settings for L2/cuMAC communication / secondary NVIPC for L2
# NOTE: Secondary must use same mempool_size as primary (cumac_l2_nvipc.yaml) to correctly
# attach to shared memory. Mismatched sizes cause undefined behavior and segmentation faults.
transport:
  type: shm
  shm_config:
    prefix: l2_cumac
    mempool_size:
      cpu_msg:
        buf_size: 8192
        pool_len: 4096
      cpu_data:
        buf_size: 20480000
        pool_len: 64
      cuda_data:
        buf_size: 307200
        pool_len: 0
      gpu_data:
        buf_size: 576000
        pool_len: 0

nvipc_log:
  # Log level: 0 - NONE, 1 - FATAL, 2 - ERROR, 3 - CONSOLE, 4 - WARNING, 5 - INFO, 6 - DEBUG, 7 - VERBOSE
  log_level: 5 # Can set to 5 when debug, but set to <=3 in production.

  # Below are FMT log configurations. Only available when NVIPC_FMTLOG_ENABLE=ON
  # Log file path and file name prefix
  fmt_log_path: "/var/log/aerial"
  fmt_log_name: "l2_cumac_muUeGrp_test"
  # Maximum FMT log file size. Unit: MB.
  fmt_log_max_size: 128

...
